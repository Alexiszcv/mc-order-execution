[theme]
base = "dark"
primaryColor = "#4CAF50"          # green accent, matches the "active day" highlight
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1A1D26"
textColor = "#E6E6E6"
font = "sans serif"

[server]
headless = true

[client]
# Hide the developer toolbar (Deploy button, hamburger menu, running-man status).
toolbarMode = "minimal"
